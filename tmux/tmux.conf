##### GENERAL ##############################################################
set -g mouse on
set -g history-limit 100000
set -g base-index 1
setw -g pane-base-index 1
set -g escape-time 0
set -sg repeat-time 600
set -g focus-events on
set -g renumber-windows on
set -g detach-on-destroy off
set -g display-time 2000
set -g remain-on-exit off
set -s extended-keys off
set -as terminal-features ",*:extkeys"
set -g xterm-keys on

# Truecolor
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",*:Tc"
set -as terminal-features "xterm-256color:RGB"

# Titles
set -g set-titles on
set -g set-titles-string "#S:#I.#P • #{pane_current_command}"

##### PREFIX ###############################################################
# unbind C-b
# set -g prefix C-Space
# bind C-Space send-prefix
bind r source-file ~/.config/tmux/tmux.conf \; display-message "✓ Reloaded tmux.conf"

##### SPLITS & LAYOUTS #####################################################
unbind '"'
unbind %
bind | split-window -h
bind - split-window -v
bind = choose-tree -Zw
bind Space next-layout
bind ! break-pane
bind z resize-pane -Z

##### NAVIGATION & RESIZE ##################################################
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -r H resize-pane -L 5
bind -r J resize-pane -D 2
bind -r K resize-pane -U 2
bind -r L resize-pane -R 5

bind S set -w synchronize-panes \; display-message "sync-panes: #{?pane_synchronized,on,off}"

##### COPY MODE ############################################################
setw -g mode-keys vi
set -g set-clipboard on

if-shell 'command -v pbcopy >/dev/null' \
  "bind -T copy-mode-vi y send -X copy-pipe-and-cancel 'pbcopy'"
if-shell 'command -v xclip >/dev/null' \
  "bind -T copy-mode-vi y send -X copy-pipe-and-cancel 'xclip -selection clipboard -in'"
if-shell 'command -v wl-copy >/dev/null' \
  "bind -T copy-mode-vi y send -X copy-pipe-and-cancel 'wl-copy'"

bind -T copy-mode-vi H send -X start-of-line
bind -T copy-mode-vi L send -X end-of-line
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi C-v send -X rectangle-toggle

##### NVIM <-> TMUX SMART NAV ##############################################
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
  | grep -iqE '^[^TXZ ]+ +(vim|n?vim|view|rvim|rview)$'"

bind -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"

##### QUALITY OF LIFE ######################################################
bind c new-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"

if-shell 'command -v fzf-tmux >/dev/null' \
  'bind f run-shell "tmux list-sessions -F \"##S\" | fzf-tmux -p 60%,60% | xargs -r tmux switch-client -t"'

##### STATUS BAR (PRO) #####################################################
# Top bar
set -g status on
set -g status-position top
set -g status-interval 5
set -g status-justify centre
set -g status-left-length 120
set -g status-right-length 200

# A clean “pill” look using powerline glyphs (needs a Nerd Font)
set -g @sep_l ""
set -g @sep_r ""
set -g @sep_slant_l ""
set -g @sep_slant_r ""

# Base status style (Catppuccin will harmonize this)
set -g status-style "bg=colour235,fg=colour250"
set -g message-style "bg=colour111,fg=colour235"
set -g pane-border-style "fg=colour237"
set -g pane-active-border-style "fg=colour111"

# Left: session + prefix highlight (from tmux-prefix-highlight)
set -g status-left "#{?client_prefix,#[fg=colour203],#[fg=colour111]}#(@sep_l)#[bg=colour111,fg=colour235,bold] 󰆍 #S #[default]#{?client_prefix,#[fg=colour203],#[fg=colour111]}#(@sep_r) #{prefix_highlight}  "

# Windows: compact + readable
setw -g window-status-separator ""
setw -g window-status-format "#[fg=colour245,bg=colour235] #I:#W "
setw -g window-status-current-format "#[fg=colour111,bg=colour235]#(@sep_l)#[bg=colour111,fg=colour235,bold] #I:#W #[fg=colour111,bg=colour235]#(@sep_r)"
setw -g window-status-activity-style "underscore,fg=colour203"
setw -g window-status-bell-style "bold,fg=colour203"

# Right: cpu/ram + battery + time + host
# tmux-cpu provides: #{cpu_percentage} #{ram_percentage} (and icons if you want) :contentReference[oaicite:4]{index=4}
# tmux-battery provides battery format strings after install :contentReference[oaicite:5]{index=5}
set -g status-right "  #[fg=colour245,bg=colour235]#(@sep_slant_l)#[bg=colour236,fg=colour250] 󰍛 #{cpu_percentage}  󰘚 #{ram_percentage} \
#[fg=colour236,bg=colour235]#(@sep_slant_l)#[bg=colour238,fg=colour250] 󰁹 #{battery_percentage} \
#[fg=colour238,bg=colour235]#(@sep_slant_l)#[bg=colour111,fg=colour235,bold] 󰥔 %a %d %b %H:%M \
#[fg=colour111,bg=colour235]#(@sep_slant_l)#[bg=colour235,fg=colour250] 󰟀 #(hostname -s)  "

##### PLUGINS (TPM) ########################################################
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'azorng/tmux-smooth-scroll'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-battery'

# Theme (TPM)
set -g @plugin 'catppuccin/tmux'
set -g @catppuccin_flavour 'mocha'

# Smooth scroll
set -g @smooth-scroll-speed "50"
set -g @smooth-scroll-normal "3"
set -g @smooth-scroll-halfpage ""
set -g @smooth-scroll-fullpage ""

run '~/.tmux/plugins/tpm/tpm'

##### CUSTOM ###############################################################
bind-key o capture-pane \; save-buffer /tmp/tmux_buffer \; \
  run-shell "grep -oE '/[^\": ]+\.py(:[0-9]+)?' /tmp/tmux_buffer | fzf | \
  xargs -r -I {} sh -c 'nvim $(echo {} | cut -d: -f1) +$(echo {} | cut -d: -f2)'"
